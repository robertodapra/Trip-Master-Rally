<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rally Trip">
<link rel="apple-touch-icon" href="icon.png">
<title>Rally Trip</title>
<style>
  :root{
    --bg:#000;
    --panel:#111417;
    --line:#2a2f36;
    --amber:#ffb400;
    --amber-dim:#8a6200;
    --green:#39d353;
    --blue:#3b9dff;
    --red:#ff4d4d;
    --text:#f2f4f7;
    --muted:#8b949e;
    --btnbg:rgba(255,255,255,.06);
    --inputbg:#1a1f25;
  }
  body[data-theme="light"]{
    --bg:#f4f5f7;
    --panel:#ffffff;
    --line:#c9ced6;
    --amber:#b36b00;
    --amber-dim:#d8b26e;
    --green:#178c3b;
    --blue:#0b6bd6;
    --red:#d62828;
    --text:#14171c;
    --muted:#5c6670;
    --btnbg:rgba(0,0,0,.05);
    --inputbg:#eef0f3;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:system-ui,-apple-system,sans-serif;
    overflow:hidden;
    user-select:none;-webkit-user-select:none;
  }

  #statusbar{
    position:fixed;top:0;left:0;right:0;z-index:3;
    display:flex;justify-content:space-between;align-items:center;
    padding:6px 12px;font-size:12px;color:var(--muted);
    padding-top:max(6px, env(safe-area-inset-top));
  }
  #clock{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:18px;font-weight:700;color:var(--text);
    font-variant-numeric:tabular-nums;letter-spacing:.05em;
  }
  #gpsdot{display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--red);vertical-align:middle}
  #gpsdot.g{background:var(--green)}
  #gpsdot.b{background:var(--blue)}
  #gpsdot.r{background:var(--red)}
  #btnInfo{
    background:var(--btnbg);border:1px solid var(--line);color:var(--muted);
    border-radius:50%;width:22px;height:22px;font-size:12px;margin-left:8px;vertical-align:middle;
  }
  #btnMenu{background:var(--btnbg);border:1px solid var(--line);color:var(--muted);border-radius:6px;padding:4px 12px;font-size:16px}

  #legend{
    position:fixed;top:56px;left:10px;z-index:9;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 16px;font-size:13px;display:none;max-width:280px;line-height:1.6;
  }
  #legend.open{display:block}
  #legend b{display:block;margin-bottom:4px;color:var(--text)}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}

  /* ====== LAYOUT PILOTA ====== */
  #app{
    display:grid;
    height:100dvh;
    padding-top:calc(34px + env(safe-area-inset-top));
    grid-template-columns:1.2fr 1fr;
    grid-template-rows:1fr 1fr;
    grid-template-areas:
      "word total"
      "word partial";
  }
  @media (orientation:portrait){
    #app{
      grid-template-columns:1fr;
      grid-template-rows:1fr 1fr 2fr;
      grid-template-areas:
        "total"
        "partial"
        "word";
    }
  }
  #zoneSpeed{display:none}

  /* ====== LAYOUT NAVIGATORE ====== */
  body[data-mode="nav"] #app{
    grid-template-columns:1.3fr 1fr;
    grid-template-rows:1fr 1fr;
    grid-template-areas:
      "partial total"
      "partial speed";
  }
  @media (orientation:portrait){
    body[data-mode="nav"] #app{
      grid-template-columns:1fr;
      grid-template-rows:1fr 1.7fr 0.8fr;
      grid-template-areas:
        "total"
        "partial"
        "speed";
    }
  }
  body[data-mode="nav"] #zoneWord{display:none}
  body[data-mode="nav"] #zoneSpeed{display:flex}
  body[data-mode="nav"] #zonePartial{cursor:pointer}
  body[data-mode="nav"] #partialVal{
    font-size:clamp(70px,16vw,190px);
    color:var(--text);
  }
  body[data-mode="nav"] #totalVal{
    font-size:clamp(44px,10vw,110px);
  }
  body[data-mode="nav"] .zlabel{
    left:12px;right:auto;top:10px;
    background:var(--btnbg);
    border:1px solid var(--line);
    border-radius:8px;
    padding:5px 10px;
    font-size:11px;
    color:var(--text);
  }
  #ssBadge{
    display:none;
    position:absolute;top:10px;right:12px;
    background:var(--green);color:#000;
    border-radius:8px;padding:5px 10px;
    font-size:12px;font-weight:800;letter-spacing:.05em;
    max-width:45%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  body[data-mode="nav"] #ssBadge.show{display:block}

  .zone{
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    border:1px solid var(--line);
    border-radius:18px;
    margin:8px;
    background:var(--panel);
    position:relative;
    overflow:hidden;
  }
  .zlabel{
    position:absolute;top:10px;left:14px;right:14px;
    font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
  }
  .unit{font-size:14px;color:var(--muted);margin-top:2px;letter-spacing:.1em}

  #zoneTotal{grid-area:total;cursor:pointer}
  #zoneTotal.holding{border-color:var(--red)}
  #totalVal{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:clamp(36px,8vw,84px);font-weight:700;
    font-variant-numeric:tabular-nums;line-height:1;
  }

  #zonePartial{grid-area:partial}
  #partialVal{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:clamp(40px,9vw,90px);font-weight:800;
    font-variant-numeric:tabular-nums;line-height:1;
    color:var(--amber);
  }
  #zonePartial.stopped #partialVal{color:var(--amber-dim)}
  body[data-mode="nav"] #zonePartial.stopped #partialVal{color:var(--text)}

  #zoneSpeed{grid-area:speed}
  #speedVal{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:clamp(44px,10vw,110px);font-weight:800;
    font-variant-numeric:tabular-nums;line-height:1;
    color:var(--blue);
  }

  #zoneWord{grid-area:word;cursor:pointer}
  #wordVal{
    font-size:clamp(60px,14vw,160px);
    font-weight:900;line-height:1;
    text-align:center;
    color:var(--green);
    text-transform:uppercase;
    word-break:break-word;
    padding:0 10px;
  }
  #wordVal.numeric{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    color:var(--amber);
    font-variant-numeric:tabular-nums;
  }
  #zoneWord.stopped #wordVal.numeric{color:var(--amber-dim)}
  #wordState{
    position:absolute;bottom:12px;
    font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
  }
  #wordState.run{color:var(--green)}

  /* ====== BANNER RADAR ====== */
  #rbBanner{
    position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
    z-index:6;display:none;
    background:var(--panel);
    border:3px solid var(--green);
    border-radius:22px;
    padding:16px 26px;
    text-align:center;
    box-shadow:0 8px 40px rgba(0,0,0,.5);
    min-width:60vw;max-width:92vw;
  }
  #rbBanner.open{display:block}
  #rbNum{
    display:inline-block;
    background:var(--green);color:#000;
    border-radius:8px;padding:2px 12px;
    font-size:clamp(16px,4vw,26px);font-weight:800;
    font-family:ui-monospace,Menlo,Consolas,monospace;
  }
  #rbSym{font-size:clamp(64px,16vw,140px);line-height:1.1}
  #rbNote{font-size:clamp(18px,4.5vw,34px);font-weight:800;text-transform:uppercase;margin-top:4px;word-break:break-word}
  #rbDist{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:clamp(30px,8vw,60px);font-weight:800;color:var(--green);
    font-variant-numeric:tabular-nums;margin-top:4px;
  }

  /* ====== DRAWER ====== */
  #drawerBg{
    position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:11;
    display:none;
  }
  #drawerBg.open{display:block}
  #drawer{
    position:fixed;top:0;right:0;bottom:0;width:min(300px,85vw);z-index:12;
    background:var(--panel);border-left:1px solid var(--line);
    transform:translateX(105%);transition:transform .25s ease;
    display:flex;flex-direction:column;padding:18px;
    padding-top:max(18px, env(safe-area-inset-top));
  }
  #drawer.open{transform:translateX(0)}
  #drawer h2{font-size:15px;letter-spacing:.15em;text-transform:uppercase;color:var(--amber);margin-bottom:16px}
  .drawer-item{
    display:flex;align-items:center;gap:12px;
    background:var(--btnbg);border:1px solid var(--line);color:var(--text);
    border-radius:12px;padding:16px;font-size:16px;font-weight:600;
    margin-bottom:10px;text-align:left;width:100%;
  }
  .drawer-item .di-icon{font-size:22px}
  .drawer-item .di-tag{
    margin-left:auto;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--green);border:1px solid var(--green);border-radius:6px;padding:2px 7px;
    display:none;
  }
  .drawer-item.active .di-tag{display:inline-block}
  #navSub{display:none;margin:-4px 0 10px 18px}
  #navSub.open{display:block}
  .drawer-sub{
    display:flex;align-items:center;gap:10px;
    background:none;border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:13px 14px;font-size:15px;font-weight:600;
    margin-bottom:8px;text-align:left;width:100%;
  }

  /* ====== OVERLAY ====== */
  .overlay{
    position:fixed;inset:0;background:var(--bg);z-index:13;
    display:none;flex-direction:column;padding:18px;overflow-y:auto;
    padding-top:max(18px, env(safe-area-inset-top));
  }
  .overlay.open{display:flex}
  .overlay h2{font-size:17px;letter-spacing:.15em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
  .overlay h3{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:18px 0 8px}
  .overlay p{font-size:14px;color:var(--text);margin-bottom:10px;line-height:1.5}
  .overlay p.small{font-size:13px;color:var(--muted)}
  .okbtn{
    background:var(--amber);color:#fff;border:none;width:100%;
    padding:15px;border-radius:10px;font-size:16px;font-weight:700;margin-top:auto;
  }
  body[data-theme="dark"] .okbtn{color:#000}
  .actbtn{
    background:var(--btnbg);border:2px solid var(--amber);color:var(--amber);
    width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:700;margin-bottom:6px;
  }
  .actbtn.active{background:var(--amber);color:#000}
  body[data-theme="light"] .actbtn.active{color:#fff}
  .chk{display:flex;align-items:center;gap:10px;font-size:14px;margin:14px 0}
  .chk input{width:22px;height:22px}

  table{width:100%;border-collapse:collapse;margin-bottom:14px}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:left;padding:6px 3px}
  td{padding:3px}
  td input, td select{
    width:100%;padding:10px 8px;background:var(--inputbg);border:1px solid var(--line);
    border-radius:8px;color:var(--text);font-size:16px;
  }
  td select{font-size:20px;padding:8px 4px}
  td button{background:none;border:none;color:var(--red);font-size:20px;padding:6px}
  .rowbtns{display:flex;gap:10px;margin-bottom:8px}
  .rowbtns button{
    flex:1;padding:14px;border-radius:10px;font-size:15px;font-weight:600;
    background:var(--panel);border:1px solid var(--line);color:var(--text);
  }
  .setting-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;font-size:14px}
  .setting-row select{padding:10px;background:var(--inputbg);border:1px solid var(--line);border-radius:8px;color:var(--text);font-size:15px}
  .setting-row input[type=checkbox]{width:24px;height:24px}

  #rbImport{
    width:100%;min-height:110px;
    background:var(--inputbg);border:1px solid var(--line);border-radius:10px;
    color:var(--text);font-size:14px;padding:10px;
    font-family:ui-monospace,Menlo,Consolas,monospace;
    margin-bottom:8px;
  }
  #rbImportBtn{
    width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;
    background:var(--btnbg);border:2px solid var(--green);color:var(--green);
    margin-bottom:6px;
  }
  #rbImportMsg{font-size:13px;color:var(--green);margin-bottom:8px;min-height:18px}

  #ssBar{display:flex;gap:8px;margin-bottom:8px}
  #ssName{
    flex:1;padding:12px;background:var(--inputbg);border:1px solid var(--line);
    border-radius:8px;color:var(--text);font-size:15px;
  }
  #ssSave{
    padding:12px 14px;border-radius:8px;background:var(--btnbg);
    border:2px solid var(--amber);color:var(--amber);font-weight:700;font-size:14px;
  }
  #ssMsg{font-size:13px;color:var(--green);min-height:18px;margin-bottom:6px}
  .ss-row{
    display:flex;align-items:center;gap:8px;
    background:var(--btnbg);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;margin-bottom:8px;
  }
  .ss-row .ss-name{flex:1;font-size:15px;font-weight:600;word-break:break-word}
  .ss-row button{
    background:none;border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:8px 12px;font-size:13px;
  }
  .ss-row button.del{color:var(--red);border:none;font-size:18px;padding:6px}
  #ssEmpty{font-size:13px;color:var(--muted);margin-bottom:8px}

  #flash{
    position:fixed;inset:0;background:rgba(255,180,0,.18);z-index:5;
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
</style>
</head>

<script>
(function(){
'use strict';

/* ================= TRADUZIONI ================= */
const T = {

const LOCALES = {it:'it-IT',en:'en-US',fr:'fr-FR',es:'es-ES',de:'de-DE',pt:'pt-PT',ja:'ja-JP',cs:'cs-CZ'};

const SYMS = ['⬅️','➡️','⬆️','↩️','↪️','➕','🔄','⛪','🏰','🌉','🛤','🛑','⚠️','⛽','🏠','🌳','🚩','🏁','🕐'];

const SYM_WORDS = [
  [/rotond|roundabout|rond/i, '🔄'],
  [/incrocio|crossroad|junction|bivio|fork/i, '➕'],
  [/sinistra|left|gauche/i, '⬅️'],
  [/destra|right|droite/i, '➡️'],
  [/diritto|dritto|straight|ahead/i, '⬆️'],
  [/stop/i, '🛑'],
  [/ponte|bridge/i, '🌉'],
  [/ferrovia|railway|passaggio a livello|rail/i, '🛤️'],
  [/chiesa|church/i, '⛪'],
  [/benzina|carburante|fuel|refuel/i, '⛽'],
  [/pericolo|attenzione|caution|danger|!!/i, '⚠️'],
  [/partenza|start|t\.?c\.?|c\.?o\.?|controllo|timbro|orologio|clock/i, '🕐'],
  [/arrivo|finish|fine/i, '🏁']
];
function wordToSym(s){
  for(const [re, sym] of SYM_WORDS){ if(re.test(s)) return sym; }
  return '⚠️';
}
function extractExit(s){
  const m = String(s).match(/((?:prima|seconda|terza|quarta|quinta|sesta|1|2|3|4|5|6)\s*[ªa°]?\s*uscita|uscita\s*(?:n\.?\s*)?\d)/i);
  return m ? m[1].toUpperCase() : null;
}

/* ================= STATO ================= */
const ACC_LIMIT = 25;
let total = 0, partial = 0;
let running = false;
let lastPos = null;
let curSpeed = 0;
let lastGoodFix = 0;
let lastFrame = performance.now();
let currentWord = null;
let lastSpoken = null;
let rbPassedIdx = null;
let cfg = {
  rows: [ {from:15, to:20, w:"ESEMPIO"} ],
  rb: [],
  ssLib: [],
  ssActive: '',
  autoReset: false,
  speak: false,
  lang: null,
  hideIntro: false,
  mode: 'pilot',
  units: 'metric',
  tunnel: true,
  theme: 'dark',
  h24: true
};

try{
  const saved = JSON.parse(localStorage.getItem('rallytrip_cfg'));
  if(saved){
    cfg = Object.assign(cfg, saved);
    cfg.rows = (cfg.rows||[]).map(r => r.m !== undefined ? {from:r.m, to:'', w:r.w} : r);
    if(!Array.isArray(cfg.rb)) cfg.rb = [];
    if(!Array.isArray(cfg.ssLib)) cfg.ssLib = [];
    cfg.rb = cfg.rb.map(r => r.d !== undefined && r.km === undefined ? {km:(parseFloat(r.d)/1000)||'', s:r.s, n:r.n} : r);
  }
}catch(e){}
if(!cfg.lang){
  const nav = (navigator.language||'en').slice(0,2).toLowerCase();
  cfg.lang = T[nav] ? nav : 'en';
}
if(cfg.mode !== 'pilot' && cfg.mode !== 'nav') cfg.mode = 'pilot';
if(cfg.units !== 'metric' && cfg.units !== 'imperial') cfg.units = 'metric';
if(cfg.theme !== 'dark' && cfg.theme !== 'light') cfg.theme = 'dark';
if(typeof cfg.tunnel !== 'boolean') cfg.tunnel = true;
if(typeof cfg.h24 !== 'boolean') cfg.h24 = true;
if(typeof cfg.autoReset !== 'boolean') cfg.autoReset = false;
if(typeof cfg.ssActive !== 'string') cfg.ssActive = '';
function saveCfg(){ localStorage.setItem('rallytrip_cfg', JSON.stringify(cfg)); }

/* ================= UNITÀ ================= */
const MI = 1609.344;
function isImp(){ return cfg.units === 'imperial'; }
function distUnit(){ return isImp() ? 'mi' : 'km'; }
function speedUnitStr(){ return isImp() ? 'mph' : 'km/h'; }

/* ================= MODALITÀ ================= */

  totalUnit.textContent = distUnit();

  speedUnit.textContent = speedUnitStr();

function partialActive(){ return running || cfg.mode === 'nav'; }

/* ================= GPS ================= */
function haversine(lat1, lon1, lat2, lon2){
  const R = 6371000, rad = Math.PI/180;
  const dLat = (lat2-lat1)*rad, dLon = (lon2-lon1)*rad;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

function onFix(pos){
  const c = pos.coords;
  const acc = c.accuracy;

  gpsdot.className = acc < 6 ? 'g' : (acc <= 10 ? 'b' : 'r');

  const hasSpeed = (c.speed !== null && !isNaN(c.speed));
  const v = hasSpeed ? (c.speed < 0.7 ? 0 : c.speed) : null;

  if(acc > ACC_LIMIT && !(v !== null && v > 3)) return;

  if(v !== null){
    curSpeed = v;
    lastGoodFix = performance.now();
    lastPos = c;
  } else {
    if(lastPos){
      const d = haversine(lastPos.latitude, lastPos.longitude, c.latitude, c.longitude);
      const noiseFloor = Math.max(2, acc * 0.5);
      if(d >= noiseFloor && d < 500){
        total += d;
        if(partialActive()) partial += d;
      }
    }
    curSpeed = 0;
    lastGoodFix = performance.now();
    lastPos = c;
  }
}

function onErr(err){ gpsdot.className='r'; }

navigator.geolocation.watchPosition(onFix, onErr, {
  enableHighAccuracy: true,
  maximumAge: 0,
  timeout: 15000
});

/* ================= PAROLE A INTERVALLI ================= */
function activeWord(p){
  for(const r of cfg.rows){
    const a = parseFloat(r.from);
    const b = (r.to === '' || r.to === null || r.to === undefined) ? Infinity : parseFloat(r.to);
    if(!isNaN(a) && r.w && p >= a && p < (isNaN(b) ? Infinity : b)) return r.w;
  }
  return null;
}

/* ================= RADAR ================= */
function parseKm(s){
  if(typeof s === 'number') return s;
  return parseFloat(String(s).replace(',', '.'));
}

function rbAutoReset(){
  if(!cfg.rb.length){ rbPassedIdx = null; return; }
  let idx = -1;
  for(let i = 0; i < cfg.rb.length; i++){
    const dM = parseKm(cfg.rb[i].km) * 1000;
    if(isNaN(dM)) continue;
    if(total >= dM) idx = i;
    else break;
  }
  if(rbPassedIdx === null){
    rbPassedIdx = idx;
    return;
  }
  if(idx > rbPassedIdx && cfg.autoReset){
    const dM = parseKm(cfg.rb[idx].km) * 1000;
    partial = Math.max(0, total - dM);
  }
  rbPassedIdx = idx;
}

function rbCheck(){
  if(cfg.mode !== 'nav' || !cfg.rb.length){ rbBanner.classList.remove('open'); return; }
  for(let i = 0; i < cfg.rb.length; i++){
    const r = cfg.rb[i];
    const dM = parseKm(r.km) * 1000;
    if(isNaN(dM)) continue;
    if(total < dM + 30){
      if(total >= dM - 50){
        rbNum.textContent = (i+1);
        rbSym.textContent = r.s || '⚠️';
        rbNote.textContent = r.n || '';
        rbDist.textContent = Math.max(0, Math.round(dM - total)) + ' m';
        rbBanner.classList.add('open');
      } else {
        rbBanner.classList.remove('open');
      }
      return;
    }
  }
  rbBanner.classList.remove('open');
}

/* ================= CONTEGGIO CONTINUO + RENDER ================= */
const loc = () => LOCALES[cfg.lang] || 'en-US';
function fmtDist(m){
  const v = isImp() ? m/MI : m/1000;
  return v.toLocaleString(loc(), {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtM(m){ return Math.round(m).toLocaleString(loc()); }
function pad(n){ return n < 10 ? '0'+n : ''+n; }

function frame(){
  const now = performance.now();
  const dtF = (now - lastFrame) / 1000;
  lastFrame = now;

  const d0 = new Date();
  let hh = d0.getHours(), suffix = '';
  if(!cfg.h24){
    suffix = hh >= 12 ? ' PM' : ' AM';
    hh = hh % 12 || 12;
  }
  clock.textContent = pad(hh)+':'+pad(d0.getMinutes())+':'+pad(d0.getSeconds())+suffix;

  const sinceFix = (now - lastGoodFix) / 1000;
  const maxGap = cfg.tunnel ? 60 : 3;
  const counting = curSpeed > 0 && lastGoodFix > 0 && sinceFix < maxGap;
  if(counting && dtF > 0 && dtF < 1){
    const d = curSpeed * dtF;
    total += d;
    if(partialActive()) partial += d;
  }

  totalVal.textContent = fmtDist(total);
  partialVal.textContent = cfg.mode === 'nav' ? fmtDist(partial) : fmtM(partial);

  if(cfg.mode === 'nav'){
    const v = counting ? curSpeed : 0;
    const s = isImp() ? v*2.236936 : v*3.6;
    speedVal.textContent = s.toLocaleString(loc(), {minimumFractionDigits:1, maximumFractionDigits:1});
    rbAutoReset();
    rbCheck();
  }

  if(cfg.mode === 'pilot'){
    if(running){
      const w = activeWord(partial);
      currentWord = w;
      if(w && cfg.speak && w !== lastSpoken && 'speechSynthesis' in window){
        lastSpoken = w;
        const u = new SpeechSynthesisUtterance(w);
        u.lang = loc();
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      }
      if(!w) lastSpoken = null;
    }
    if(currentWord){
      if(wordVal.textContent !== currentWord){ wordVal.textContent = currentWord; }
      wordVal.classList.remove('numeric');
    } else {
      wordVal.textContent = fmtM(partial);
      wordVal.classList.add('numeric');
    }
  }
  requestAnimationFrame(frame);
}

/* ================= AZIONE PRINCIPALE ================= */
function anyOverlayOpen(){
  return ['intro','pilotMenu','navMenu','genMenu'].some(id => $(id).classList.contains('open'))
    || $('drawer').classList.contains('open');
}

function mainAction(){
  if(cfg.mode === 'nav'){
    partial = 0;
  } else {
    if(running){
      running = false;
      zonePartial.classList.add('stopped');
      zoneWord.classList.add('stopped');
    } else {
      partial = 0;
      currentWord = null;
      lastSpoken = null;
      running = true;
      zonePartial.classList.remove('stopped');
      zoneWord.classList.remove('stopped');
    }
    updateStateText();
  }
  flash.style.opacity = 1;
  setTimeout(()=>flash.style.opacity=0, 200);
  if(navigator.vibrate) navigator.vibrate(60);
}

zoneWord.addEventListener('click', mainAction);
zonePartial.addEventListener('click', ()=>{ if(cfg.mode === 'nav') mainAction(); });

window.addEventListener('keydown', e => {
  if(anyOverlayOpen()) return;
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  e.preventDefault();
  mainAction();
});

let holdTimer = null;
function startHold(e){
  zoneTotal.classList.add('holding');
  holdTimer = setTimeout(()=>{
    total = 0;
    rbPassedIdx = null;
    zoneTotal.classList.remove('holding');
    flash.style.opacity = 1;
    setTimeout(()=>flash.style.opacity=0, 200);
    if(navigator.vibrate) navigator.vibrate([40,40,40]);

  }, 2000);
}

  zoneTotal.classList.remove('holding');
  if(holdTimer){ clearTimeout(holdTimer); holdTimer = null; }
}
zoneTotal.addEventListener('pointerdown', startHold);

zoneTotal.addEventListener('pointercancel', cancelHold);

function buildSsList(){
  const list = $('ssList');
  list.innerHTML = '';
  $('ssEmpty').style.display = cfg.ssLib.length ? 'none' : 'block';
  cfg.ssLib.forEach((ss,i)=>{
    const row = document.createElement('div');
    row.className = 'ss-row';
    const name = document.createElement('span');
    name.className = 'ss-name';
    name.textContent = ss.name;
    const loadBtn = document.createElement('button');
    loadBtn.textContent = t('ssLoad');
    loadBtn.addEventListener('click', ()=>{
      cfg.rb = JSON.parse(JSON.stringify(ss.rb));
      cfg.ssActive = ss.name;
      rbPassedIdx = null;
      $('ssName').value = ss.name;
      buildRbTable();
      updateSsBadge();
      saveCfg();
      $('ssMsg').textContent = '“' + ss.name + '” — ' + t('ssLoadedMsg');
    });
    const delBtn = document.createElement('button');
    delBtn.className = 'del';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', ()=>{
      if(cfg.ssActive === cfg.ssLib[i].name){ cfg.ssActive = ''; updateSsBadge(); }
      cfg.ssLib.splice(i,1);
      saveCfg();
      buildSsList();
    });
    row.appendChild(name);
    row.appendChild(loadBtn);
    row.appendChild(delBtn);
    list.appendChild(row);
  });
}

$('ssSave').addEventListener('click', ()=>{
  const name = $('ssName').value.trim();
  if(!name){ $('ssMsg').textContent = t('ssNoName'); return; }
  const data = JSON.parse(JSON.stringify(cfg.rb.filter(r => r.km !== '')));
  const existing = cfg.ssLib.find(s => s.name === name);
  if(existing){ existing.rb = data; }
  else { cfg.ssLib.push({name: name, rb: data}); }
  cfg.ssActive = name;
  updateSsBadge();
  saveCfg();
  buildSsList();
  $('ssMsg').textContent = '“' + name + '” — ' + t('ssSavedMsg');
});

const rbBody = $('rbBody');

function symOptions(sel){
  return SYMS.map(s => '<option value="'+s+'"'+(s===sel?' selected':'')+'>'+s+'</option>').join('');
}
function buildRbTable(){
  rbBody.innerHTML = '';
  cfg.rb.forEach((r,i)=>{
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td><input type="text" inputmode="decimal" value="'+ (r.km ?? '') +'" data-i="'+i+'" data-f="km" placeholder="0,00"></td>' +
      '<td><select data-i="'+i+'" data-f="s">'+ symOptions(r.s || SYMS[0]) +'</select></td>' +
      '<td><input type="text" value="'+ (r.n ? String(r.n).replace(/"/g,'&quot;') : '') +'" data-i="'+i+'" data-f="n"></td>' +
      '<td><button data-del="'+i+'">✕</button></td>';
    rbBody.appendChild(tr);
  });
}
rbBody.addEventListener('input', e=>{
  const i = e.target.dataset.i, f = e.target.dataset.f;
  if(i !== undefined && f) cfg.rb[i][f] = e.target.value;
});
rbBody.addEventListener('change', e=>{
  const i = e.target.dataset.i, f = e.target.dataset.f;
  if(i !== undefined && f) cfg.rb[i][f] = e.target.value;
});
rbBody.addEventListener('click', e=>{
  const del = e.target.dataset.del;
  if(del !== undefined){ cfg.rb.splice(del,1); buildRbTable(); }
});
$('rbAddRow').addEventListener('click', ()=>{ cfg.rb.push({km:'',s:SYMS[0],n:''}); buildRbTable(); });
$('rbClear').addEventListener('click', ()=>{ cfg.rb = []; rbPassedIdx = null; buildRbTable(); });

$('rbImportBtn').addEventListener('click', ()=>{
  const lines = $('rbImport').value.split('\n');
  let added = 0;
  for(const line of lines){
    const parts = line.split(';').map(s => s.trim());
    if(parts.length < 2) continue;
    const km = parseKm(parts[0]);
    if(isNaN(km)) continue;
    const sym = wordToSym(parts[1] || '');
    let note = (parts[2] || '').trim();
    const exit = extractExit(parts[1] || '');
    if(exit){ note = exit + (note ? ' · ' + note : ''); }
    if(!note) note = (parts[1] || '').trim();
    cfg.rb.push({km: parts[0].replace('.', ','), s: sym, n: note});
    added++;
  }
  if(added > 0){
    cfg.rb.sort((a,b)=>parseKm(a.km)-parseKm(b.km));
    rbPassedIdx = null;
    buildRbTable();
    $('rbImport').value = '';
    $('rbImportMsg').textContent = added + ' ' + t('rbImpOk');
  } else {
    $('rbImportMsg').textContent = t('rbImpErr');
  }
});

$('closeNav').addEventListener('click', ()=>{
  cfg.rb = cfg.rb.filter(r => r.km !== '');
  cfg.rb.sort((a,b)=>parseKm(a.km)-parseKm(b.km));
  cfg.autoReset = $('autoResetToggle').checked;
  rbPassedIdx = null;
  saveCfg();
  $('navMenu').classList.remove('open');
});

/* ================= IMPOSTAZIONI GENERALI ================= */
$('themeSel').addEventListener('change', ()=>{
  cfg.theme = $('themeSel').value;
  applyTheme();
});
$('langSel').addEventListener('change', ()=>{
  cfg.lang = $('langSel').value;
  applyLang();
});
$('unitSel').addEventListener('change', ()=>{
  cfg.units = $('unitSel').value;
  applyUnits();
});
$('closeGen').addEventListener('click', ()=>{
  cfg.lang = $('langSel').value;
  cfg.units = $('unitSel').value;
  cfg.h24 = $('timeSel').value === '24';
  cfg.theme = $('themeSel').value;
  cfg.tunnel = $('tunnelToggle').checked;
  saveCfg();
  applyLang();
  applyUnits();
  applyTheme();
  $('genMenu').classList.remove('open');
});

/* ================= SCHERMO SEMPRE ACCESO ================= */
let wakeLock = null;
async function keepAwake(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
    }
  }catch(e){}
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible') keepAwake();
});
keepAwake();

/* ================= SERVICE WORKER (PWA) ================= */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

applyTheme();
applyMode();
requestAnimationFrame(frame);
})();
</script>
