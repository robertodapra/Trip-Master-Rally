<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rally Trip">
<link rel="apple-touch-icon" href="icon.png">
<title>Rally Trip</title>
<style>
  :root{
    --bg:#000;
    --panel:#111417;
    --line:#2a2f36;
    --amber:#ffb400;
    --amber-dim:#8a6200;
    --green:#39d353;
    --blue:#3b9dff;
    --red:#ff4d4d;
    --text:#f2f4f7;
    --muted:#8b949e;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:system-ui,-apple-system,sans-serif;
    overflow:hidden;
    user-select:none;-webkit-user-select:none;
  }

  #statusbar{
    position:fixed;top:0;left:0;right:0;z-index:3;
    display:flex;justify-content:space-between;align-items:center;
    padding:6px 12px;font-size:12px;color:var(--muted);
    padding-top:max(6px, env(safe-area-inset-top));
  }
  #clock{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:18px;font-weight:700;color:var(--text);
    font-variant-numeric:tabular-nums;letter-spacing:.05em;
  }
  #gpsdot{display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--red);vertical-align:middle}
  #gpsdot.g{background:var(--green)}
  #gpsdot.b{background:var(--blue)}
  #gpsdot.r{background:var(--red)}
  #btnInfo{
    background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted);
    border-radius:50%;width:22px;height:22px;font-size:12px;margin-left:8px;vertical-align:middle;
  }
  #btnSettings{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted);border-radius:6px;padding:4px 12px;font-size:16px}

  #legend{
    position:fixed;top:56px;left:10px;z-index:9;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 16px;font-size:13px;display:none;max-width:280px;line-height:1.6;
  }
  #legend.open{display:block}
  #legend b{display:block;margin-bottom:4px;color:var(--text)}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}

  /* ====== LAYOUT PILOTA ====== */
  #app{
    display:grid;
    height:100dvh;
    padding-top:calc(34px + env(safe-area-inset-top));
    grid-template-columns:1.2fr 1fr;
    grid-template-rows:1fr 1fr;
    grid-template-areas:
      "word total"
      "word partial";
  }
  @media (orientation:portrait){
    #app{
      grid-template-columns:1fr;
      grid-template-rows:1fr 1fr 2fr;
      grid-template-areas:
        "total"
        "partial"
        "word";
    }
  }
  #zoneSpeed{display:none}

  /* ====== LAYOUT NAVIGATORE ====== */
  body[data-mode="nav"] #app{
    grid-template-columns:1.3fr 1fr;
    grid-template-rows:1fr 1fr;
    grid-template-areas:
      "partial total"
      "partial speed";
  }
  @media (orientation:portrait){
    body[data-mode="nav"] #app{
      grid-template-columns:1fr;
      grid-template-rows:1fr 1.7fr 0.8fr;
      grid-template-areas:
        "total"
        "partial"
        "speed";
    }
  }
  body[data-mode="nav"] #zoneWord{display:none}
  body[data-mode="nav"] #zoneSpeed{display:flex}
  body[data-mode="nav"] #zonePartial{cursor:pointer}
  body[data-mode="nav"] #partialVal{
    font-size:clamp(70px,16vw,190px);
    color:var(--text);
  }
  body[data-mode="nav"] #totalVal{
    font-size:clamp(44px,10vw,110px);
  }
  /* etichette a riquadro in modalità navigatore */
  body[data-mode="nav"] .zlabel{
    left:12px;right:auto;top:10px;
    background:rgba(255,255,255,.07);
    border:1px solid var(--line);
    border-radius:8px;
    padding:5px 10px;
    font-size:11px;
    color:var(--text);
  }

  .zone{
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    border:1px solid var(--line);
    border-radius:18px;
    margin:8px;
    background:var(--panel);
    position:relative;
    overflow:hidden;
  }
  .zlabel{
    position:absolute;top:10px;left:14px;right:14px;
    font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
  }
  .unit{font-size:14px;color:var(--muted);margin-top:2px;letter-spacing:.1em}

  #zoneTotal{grid-area:total;cursor:pointer}
  #totalVal{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:clamp(36px,8vw,84px);font-weight:700;
    font-variant-numeric:tabular-nums;line-height:1;
  }

  #zonePartial{grid-area:partial}
  #partialVal{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:clamp(40px,9vw,90px);font-weight:800;
    font-variant-numeric:tabular-nums;line-height:1;
    color:var(--amber);
  }
  #zonePartial.stopped #partialVal{color:var(--amber-dim)}
  body[data-mode="nav"] #zonePartial.stopped #partialVal{color:var(--text)}

  #zoneSpeed{grid-area:speed}
  #speedVal{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:clamp(44px,10vw,110px);font-weight:800;
    font-variant-numeric:tabular-nums;line-height:1;
    color:var(--blue);
  }

  #zoneWord{grid-area:word;cursor:pointer}
  #wordVal{
    font-size:clamp(60px,14vw,160px);
    font-weight:900;line-height:1;
    text-align:center;
    color:var(--green);
    text-transform:uppercase;
    word-break:break-word;
    padding:0 10px;
  }
  #wordVal.numeric{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    color:var(--amber);
    font-variant-numeric:tabular-nums;
  }
  #zoneWord.stopped #wordVal.numeric{color:var(--amber-dim)}
  #wordState{
    position:absolute;bottom:12px;
    font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
  }
  #wordState.run{color:var(--green)}

  /* ====== OVERLAY (intro + menu) ====== */
  .overlay{
    position:fixed;inset:0;background:var(--bg);z-index:10;
    display:none;flex-direction:column;padding:18px;overflow-y:auto;
    padding-top:max(18px, env(safe-area-inset-top));
  }
  .overlay.open{display:flex}
  .overlay h2{font-size:17px;letter-spacing:.15em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
  .overlay h3{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:18px 0 8px}
  .overlay p{font-size:14px;color:var(--text);margin-bottom:10px;line-height:1.5}
  .overlay p.small{font-size:13px;color:var(--muted)}
  .okbtn{
    background:var(--amber);color:#000;border:none;width:100%;
    padding:15px;border-radius:10px;font-size:16px;font-weight:700;margin-top:auto;
  }
  .chk{display:flex;align-items:center;gap:10px;font-size:14px;margin:14px 0}
  .chk input{width:22px;height:22px}

  /* selettore modalità */
  #modeSeg{display:flex;gap:8px;margin-bottom:6px}
  #modeSeg button{
    flex:1;padding:14px;border-radius:10px;font-size:15px;font-weight:700;
    background:var(--panel);border:1px solid var(--line);color:var(--muted);
  }
  #modeSeg button.sel{background:var(--amber);color:#000;border-color:var(--amber)}

  table{width:100%;border-collapse:collapse;margin-bottom:14px}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:left;padding:6px 3px}
  td{padding:3px}
  td input{
    width:100%;padding:10px 8px;background:#1a1f25;border:1px solid var(--line);
    border-radius:8px;color:var(--text);font-size:16px;
  }
  td button{background:none;border:none;color:var(--red);font-size:20px;padding:6px}
  .rowbtns{display:flex;gap:10px;margin-bottom:8px}
  .rowbtns button{
    flex:1;padding:14px;border-radius:10px;font-size:15px;font-weight:600;
    background:var(--panel);border:1px solid var(--line);color:var(--text);
  }
  .setting-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;font-size:14px}
  .setting-row input[type=number]{width:90px;padding:10px;background:#1a1f25;border:1px solid var(--line);border-radius:8px;color:var(--text);font-size:16px;text-align:center}
  .setting-row select{padding:10px;background:#1a1f25;border:1px solid var(--line);border-radius:8px;color:var(--text);font-size:15px}

  #flash{
    position:fixed;inset:0;background:rgba(255,180,0,.15);z-index:5;
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
</style>
</head>
<body data-mode="pilot">

<div id="statusbar">
  <span><span id="gpsdot" class="r"></span><button id="btnInfo">i</button></span>
  <span id="clock">--:--:--</span>
  <button id="btnSettings">☰</button>
</div>

<div id="legend">
  <b data-t="legTitle"></b>
  <span class="dot" style="background:var(--green)"></span><span data-t="legGreen"></span><br>
  <span class="dot" style="background:var(--blue)"></span><span data-t="legBlue"></span><br>
  <span class="dot" style="background:var(--red)"></span><span data-t="legRed"></span>
</div>

<div id="app">
  <div class="zone" id="zoneWord">
    <span class="zlabel" data-t="wordLabel"></span>
    <div id="wordVal" class="numeric">0</div>
    <div id="wordState"></div>
  </div>

  <div class="zone" id="zoneTotal">
    <span class="zlabel" data-t="totalLabel"></span>
    <div id="totalVal">0,00</div>
    <div class="unit" id="totalUnit">km</div>
  </div>

  <div class="zone stopped" id="zonePartial">
    <span class="zlabel" id="partialLbl" data-t="partialLabel"></span>
    <div id="partialVal">0</div>
    <div class="unit" id="partialUnit">m</div>
  </div>

  <div class="zone" id="zoneSpeed">
    <span class="zlabel" data-t="speedLabel"></span>
    <div id="speedVal">0</div>
    <div class="unit" id="speedUnit">km/h</div>
  </div>
</div>

<div id="flash"></div>

<!-- ============ INTRODUZIONE ============ -->
<div class="overlay" id="intro">
  <h2 data-t="introTitle"></h2>
  <p data-t="intro1"></p>
  <p data-t="intro2"></p>
  <p data-t="intro5"></p>
  <p data-t="intro3"></p>
  <p class="small" data-t="intro4"></p>
  <div class="chk"><input type="checkbox" id="hideIntro"><label for="hideIntro" data-t="dontShow"></label></div>
  <button class="okbtn" id="closeIntro" data-t="start"></button>
</div>

<!-- ============ MENU ============ -->
<div class="overlay" id="settings">
  <h2 data-t="setTitle"></h2>

  <h3 data-t="modeLabel"></h3>
  <div id="modeSeg">
    <button id="modePilot" data-t="modePilot"></button>
    <button id="modeNav" data-t="modeNav"></button>
  </div>
  <p class="small" data-t="modeDesc"></p>

  <h3 data-t="wordsTitle"></h3>
  <p class="small" data-t="setDesc"></p>
  <table>
    <thead><tr><th style="width:26%" data-t="thFrom"></th><th style="width:26%" data-t="thTo"></th><th data-t="thWord"></th><th></th></tr></thead>
    <tbody id="tblBody"></tbody>
  </table>
  <div class="rowbtns">
    <button id="addRow" data-t="addRow"></button>
  </div>

  <h3 data-t="optTitle"></h3>
  <div class="setting-row">
    <span data-t="langLabel"></span>
    <select id="langSel">
      <option value="it">Italiano</option>
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="es">Español</option>
      <option value="de">Deutsch</option>
      <option value="pt">Português</option>
      <option value="ja">日本語</option>
      <option value="cs">Čeština</option>
    </select>
  </div>
  <div class="setting-row">
    <span data-t="unitLabel"></span>
    <select id="unitSel">
      <option value="metric">km · km/h</option>
      <option value="imperial">mi · mph</option>
    </select>
  </div>
  <div class="setting-row">
    <span><span data-t="accLabel"></span><br><small style="color:var(--muted)" data-t="accSmall"></small></span>
    <input type="number" id="accLimit" min="5" max="100" step="1">
  </div>
  <div class="setting-row">
    <span data-t="speakLabel"></span>
    <input type="checkbox" id="speakToggle" style="width:24px;height:24px">
  </div>

  <button class="okbtn" id="closeSettings" data-t="close"></button>
</div>

};
const LOCALES = {it:'it-IT',en:'en-US',fr:'fr-FR',es:'es-ES',de:'de-DE',pt:'pt-PT',ja:'ja-JP',cs:'cs-CZ'};

/* ================= STATO ================= */
let total = 0, partial = 0;
let running = false;
let lastPos = null;
let curSpeed = 0;
let lastFixTime = 0;
let lastFixTs = null;
let currentWord = null;
let lastSpoken = null;
let cfg = {
  rows: [ {from:15, to:20, w:"ESEMPIO"} ],
  accLimit: 20,
  speak: false,
  lang: null,
  hideIntro: false,
  mode: 'pilot',
  units: 'metric'
};

try{
  const saved = JSON.parse(localStorage.getItem('rallytrip_cfg'));
  if(saved){
    cfg = Object.assign(cfg, saved);
    cfg.rows = (cfg.rows||[]).map(r => r.m !== undefined ? {from:r.m, to:'', w:r.w} : r);
  }
}catch(e){}
if(!cfg.lang){
  const nav = (navigator.language||'en').slice(0,2).toLowerCase();
  cfg.lang = T[nav] ? nav : 'en';
}
if(cfg.mode !== 'pilot' && cfg.mode !== 'nav') cfg.mode = 'pilot';
if(cfg.units !== 'metric' && cfg.units !== 'imperial') cfg.units = 'metric';
function saveCfg(){ localStorage.setItem('rallytrip_cfg', JSON.stringify(cfg)); }

/* ================= LINGUA ================= */
function t(k){ return (T[cfg.lang]||T.en)[k] || T.en[k] || k; }
function applyLang(){
  document.documentElement.lang = cfg.lang;
  document.querySelectorAll('[data-t]').forEach(el=>{
    el.textContent = t(el.dataset.t);
  });
  updateStateText();
}

/* ================= ELEMENTI ================= */
const $ = id => document.getElementById(id);
const totalVal=$('totalVal'), partialVal=$('partialVal'),
      wordVal=$('wordVal'), wordState=$('wordState'),
      zoneWord=$('zoneWord'), zonePartial=$('zonePartial'),
      gpsdot=$('gpsdot'), flash=$('flash'), clock=$('clock'),
      partialLbl=$('partialLbl'), partialUnit=$('partialUnit'),
      totalUnit=$('totalUnit'), speedVal=$('speedVal'), speedUnit=$('speedUnit');

function updateStateText(){
  if(running){ wordState.textContent=t('running'); wordState.className='run'; }
  else if(partial>0){ wordState.textContent=t('stopped'); wordState.className=''; }
  else { wordState.textContent=t('ready'); wordState.className=''; }
}

/* ================= UNITÀ ================= */
const MI = 1609.344;
function isImp(){ return cfg.units === 'imperial'; }
function distUnit(){ return isImp() ? 'mi' : 'km'; }
function speedUnitStr(){ return isImp() ? 'mph' : 'km/h'; }

/* ================= MODALITÀ ================= */
function applyMode(){
  document.body.dataset.mode = cfg.mode;
  partialLbl.dataset.t = cfg.mode === 'nav' ? 'navPartialLabel' : 'partialLabel';
  applyUnits();
  $('modePilot').classList.toggle('sel', cfg.mode === 'pilot');
  $('modeNav').classList.toggle('sel', cfg.mode === 'nav');
  if(cfg.mode === 'nav'){
    zonePartial.classList.remove('stopped');
  } else if(!running){
    zonePartial.classList.add('stopped');
  }
  applyLang();
}
function applyUnits(){
  totalUnit.textContent = distUnit();
  partialUnit.textContent = cfg.mode === 'nav' ? distUnit() : 'm';
  speedUnit.textContent = speedUnitStr();
}
function partialActive(){ return running || cfg.mode === 'nav'; }

/* ================= GPS ================= */
function haversine(lat1, lon1, lat2, lon2){
  const R = 6371000, rad = Math.PI/180;
  const dLat = (lat2-lat1)*rad, dLon = (lon2-lon1)*rad;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

function onFix(pos){
  const c = pos.coords;
  const acc = c.accuracy;

  gpsdot.className = acc < 6 ? 'g' : (acc <= 10 ? 'b' : 'r');

  const hasSpeed = (c.speed !== null && !isNaN(c.speed));

  if(hasSpeed){
    const v = c.speed < 0.7 ? 0 : c.speed;
    if(lastFixTs !== null){
      const dt = (pos.timestamp - lastFixTs) / 1000;
      if(dt > 0 && dt < 5 && v > 0){
        const d = v * dt;
        total += d;
        if(partialActive()) partial += d;
      }
    }
    curSpeed = v;
    lastFixTs = pos.timestamp;
    lastFixTime = performance.now();
    lastPos = c;
  } else {
    if(acc > cfg.accLimit) return;
    if(lastPos){
      const d = haversine(lastPos.latitude, lastPos.longitude, c.latitude, c.longitude);
      const noiseFloor = Math.max(2, acc * 0.5);
      if(d >= noiseFloor && d < 500){
        total += d;
        if(partialActive()) partial += d;
        lastFixTime = performance.now();
      }
    }
    lastPos = c;
  }
}

function onErr(err){ gpsdot.className='r'; }

navigator.geolocation.watchPosition(onFix, onErr, {
  enableHighAccuracy: true,
  maximumAge: 0,
  timeout: 15000
});

/* ================= PAROLE A INTERVALLI ================= */
function activeWord(p){
  for(const r of cfg.rows){
    const a = parseFloat(r.from);
    const b = (r.to === '' || r.to === null || r.to === undefined) ? Infinity : parseFloat(r.to);
    if(!isNaN(a) && r.w && p >= a && p < (isNaN(b) ? Infinity : b)) return r.w;
  }
  return null;
}

/* ================= RENDER IN TEMPO REALE ================= */
const loc = () => LOCALES[cfg.lang] || 'en-US';
function fmtDist(m){
  const v = isImp() ? m/MI : m/1000;
  return v.toLocaleString(loc(), {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtM(m){ return Math.round(m).toLocaleString(loc()); }
function pad(n){ return n < 10 ? '0'+n : ''+n; }

function frame(){
  const now = performance.now();

  // orologio
  const d0 = new Date();
  clock.textContent = pad(d0.getHours())+':'+pad(d0.getMinutes())+':'+pad(d0.getSeconds());

  // interpolazione: tra un fix GPS e l'altro, avanza usando la velocità
  let extra = 0;
  const dt = (now - lastFixTime) / 1000;
  const fresh = dt < 3;
  if(curSpeed > 0.7 && fresh){
    extra = Math.min(curSpeed * dt, 60);
  }
  const dispTotal = total + extra;
  const dispPartial = partialActive() ? partial + extra : partial;

  totalVal.textContent = fmtDist(dispTotal);
  // parziale: km/mi in modalità navigatore, metri in modalità pilota
  partialVal.textContent = cfg.mode === 'nav' ? fmtDist(dispPartial) : fmtM(dispPartial);

  // velocità in tempo reale (modalità navigatore)
  if(cfg.mode === 'nav'){
    const v = fresh ? curSpeed : 0;
    const s = isImp() ? v*2.236936 : v*3.6;
    speedVal.textContent = s.toLocaleString(loc(), {minimumFractionDigits:1, maximumFractionDigits:1});
  }

  // zona sinistra (solo modalità pilota)
  if(cfg.mode === 'pilot'){
    if(running){
      const w = activeWord(dispPartial);
      currentWord = w;
      if(w && cfg.speak && w !== lastSpoken && 'speechSynthesis' in window){
        lastSpoken = w;
        const u = new SpeechSynthesisUtterance(w);
        u.lang = loc();
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      }
      if(!w) lastSpoken = null;
    }
    if(currentWord){
      if(wordVal.textContent !== currentWord){ wordVal.textContent = currentWord; }
      wordVal.classList.remove('numeric');
    } else {
      wordVal.textContent = fmtM(dispPartial);
      wordVal.classList.add('numeric');
    }
  }
  requestAnimationFrame(frame);
}

/* ================= AZIONE PRINCIPALE (tocco / tasto BT) ================= */
function mainAction(){
  if(cfg.mode === 'nav'){
    partial = 0;
  } else {
    if(running){
      running = false;
      zonePartial.classList.add('stopped');
      zoneWord.classList.add('stopped');
    } else {
      partial = 0;
      currentWord = null;
      lastSpoken = null;
      running = true;
      zonePartial.classList.remove('stopped');
      zoneWord.classList.remove('stopped');
    }
    updateStateText();
  }
  flash.style.opacity = 1;
  setTimeout(()=>flash.style.opacity=0, 200);
  if(navigator.vibrate) navigator.vibrate(60);
}

zoneWord.addEventListener('click', mainAction);
zonePartial.addEventListener('click', ()=>{ if(cfg.mode === 'nav') mainAction(); });

window.addEventListener('keydown', e => {
  if($('settings').classList.contains('open') || $('intro').classList.contains('open')) return;
  if(e.target.tagName === 'INPUT') return;
  e.preventDefault();
  mainAction();
});

/* ================= TOTALE: reset ================= */
$('zoneTotal').addEventListener('click', ()=>{
  total = 0;
  if(navigator.vibrate) navigator.vibrate([40,40,40]);
});

/* ================= LEGENDA GPS ================= */
$('btnInfo').addEventListener('click', e=>{
  e.stopPropagation();
  $('legend').classList.toggle('open');
});
document.addEventListener('click', e=>{
  if(!$('legend').contains(e.target) && e.target.id!=='btnInfo'){
    $('legend').classList.remove('open');
  }
}, true);

/* ================= INTRODUZIONE ================= */
if(!cfg.hideIntro) $('intro').classList.add('open');
$('closeIntro').addEventListener('click', ()=>{
  cfg.hideIntro = $('hideIntro').checked;
  saveCfg();
  $('intro').classList.remove('open');
});

/* ================= MENU ================= */
const settings = $('settings'), tblBody = $('tblBody');

$('modePilot').addEventListener('click', ()=>{ cfg.mode='pilot'; applyMode(); });
$('modeNav').addEventListener('click', ()=>{ cfg.mode='nav'; applyMode(); });

function buildTable(){
  tblBody.innerHTML = '';
  cfg.rows.forEach((r,i)=>{
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td><input type="number" inputmode="decimal" value="'+ (r.from ?? '') +'" data-i="'+i+'" data-f="from"></td>' +
      '<td><input type="number" inputmode="decimal" value="'+ (r.to ?? '') +'" data-i="'+i+'" data-f="to"></td>' +
      '<td><input type="text" value="'+ (r.w ? String(r.w).replace(/"/g,'&quot;') : '') +'" data-i="'+i+'" data-f="w"></td>' +
      '<td><button data-del="'+i+'">✕</button></td>';
    tblBody.appendChild(tr);
  });
}

tblBody.addEventListener('input', e=>{
  const i = e.target.dataset.i, f = e.target.dataset.f;
  if(i !== undefined && f) cfg.rows[i][f] = e.target.value;
});
tblBody.addEventListener('click', e=>{
  const del = e.target.dataset.del;
  if(del !== undefined){ cfg.rows.splice(del,1); buildTable(); }
});
$('addRow').addEventListener('click', ()=>{ cfg.rows.push({from:'',to:'',w:''}); buildTable(); });

$('btnSettings').addEventListener('click', e=>{
  e.stopPropagation();
  $('accLimit').value = cfg.accLimit;
  $('speakToggle').checked = cfg.speak;
  $('langSel').value = cfg.lang;
  $('unitSel').value = cfg.units;
  buildTable();
  settings.classList.add('open');
});
$('langSel').addEventListener('change', ()=>{
  cfg.lang = $('langSel').value;
  applyLang();
});
$('unitSel').addEventListener('change', ()=>{
  cfg.units = $('unitSel').value;
  applyUnits();
});
$('closeSettings').addEventListener('click', ()=>{
  cfg.accLimit = Math.max(5, parseFloat($('accLimit').value) || 20);
  cfg.speak = $('speakToggle').checked;
  cfg.lang = $('langSel').value;
  cfg.units = $('unitSel').value;
  cfg.rows = cfg.rows.filter(r => r.from !== '' && r.w !== '');
  cfg.rows.sort((a,b)=>parseFloat(a.from)-parseFloat(b.from));
  saveCfg();
  applyLang();
  applyUnits();
  settings.classList.remove('open');
});

/* ================= SCHERMO SEMPRE ACCESO ================= */
let wakeLock = null;
async function keepAwake(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
    }
  }catch(e){}
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible') keepAwake();
});
keepAwake();

/* ================= SERVICE WORKER (PWA) ================= */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

applyMode();
requestAnimationFrame(frame);
})();
</script>
