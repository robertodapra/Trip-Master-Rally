<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rally Trip">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Orbitron:wght@600;800&family=Share+Tech+Mono&display=swap">
<title>Rally Trip</title>
<style>
  :root{
    --mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
    --bg:#000;
    --panel:#111417;
    --line:#2a2f36;
    --amber:#ffb400;
    --amber-dim:#8a6200;
    --green:#39d353;
    --blue:#3b9dff;
    --red:#ff4d4d;
    --text:#f2f4f7;
    --muted:#8b949e;
    --btnbg:rgba(255,255,255,.06);
    --inputbg:#1a1f25;
  }
  body[data-theme="light"]{
    --bg:#f4f5f7;
    --panel:#ffffff;
    --line:#c9ced6;
    --amber:#b36b00;
    --amber-dim:#d8b26e;
    --green:#178c3b;
    --blue:#0b6bd6;
    --red:#d62828;
    --text:#14171c;
    --muted:#5c6670;
    --btnbg:rgba(0,0,0,.05);
    --inputbg:#eef0f3;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{--numscale:1}
  body[data-numsize="0"]{--numscale:.85}
  body[data-numsize="2"]{--numscale:1.2}
  body[data-numfont="share"]{--mono:'Share Tech Mono',ui-monospace,Menlo,Consolas,monospace}
  body[data-numfont="orbitron"]{--mono:'Orbitron',ui-monospace,Menlo,Consolas,monospace}
  body[data-numfont="system"]{--mono:ui-monospace,Menlo,Consolas,monospace}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:system-ui,-apple-system,sans-serif;
    overflow:hidden;
    user-select:none;-webkit-user-select:none;
  }

  #statusbar{
    position:fixed;top:0;left:0;right:0;z-index:3;
    display:flex;justify-content:space-between;align-items:center;
    padding:6px 12px;font-size:12px;color:var(--muted);
    padding-top:max(6px, env(safe-area-inset-top));
  }
  #clock{
    font-family:var(--mono);
    font-size:18px;font-weight:700;color:var(--text);
    font-variant-numeric:tabular-nums;letter-spacing:.05em;
  }
  #gpsdot{display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--red);vertical-align:middle}
  #gpsdot.g{background:var(--green)}
  #gpsdot.b{background:var(--blue)}
  #gpsdot.r{background:var(--red)}
  #btnInfo{
    background:var(--btnbg);border:1px solid var(--line);color:var(--muted);
    border-radius:50%;width:22px;height:22px;font-size:12px;margin-left:8px;vertical-align:middle;
  }
  #btnMenu{background:var(--btnbg);border:1px solid var(--line);color:var(--muted);border-radius:6px;padding:4px 12px;font-size:16px}
  #btnArr{
    display:none;
    background:var(--btnbg);border:1px solid var(--line);color:var(--muted);
    border-radius:6px;padding:4px 10px;font-size:16px;margin-right:8px;
  }
  @media (orientation:landscape){
    body[data-mode="radar"] #btnArr{display:inline-block}
  }

  #legend{
    position:fixed;top:56px;left:10px;z-index:9;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 16px;font-size:13px;display:none;max-width:280px;line-height:1.6;
  }
  #legend.open{display:block}
  #legend b{display:block;margin-bottom:4px;color:var(--text)}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}

  /* ====== LAYOUT PILOTA ====== */
  #app{
    display:grid;
    height:100dvh;
    padding-top:calc(34px + env(safe-area-inset-top));
    grid-template-columns:1.2fr 1fr;
    grid-template-rows:1fr 1fr;
    grid-template-areas:
      "word total"
      "word partial";
  }
  @media (orientation:portrait){
    #app{
      grid-template-columns:1fr;
      grid-template-rows:1fr 1fr 2fr;
      grid-template-areas:
        "total"
        "partial"
        "word";
    }
  }
  #zoneSpeed{display:none}
  #zoneRadar{display:none}

  /* ====== LAYOUT NAVIGATORE / TRIP ====== */
  body[data-mode="nav"] #app{
    grid-template-columns:1.3fr 1fr;
    grid-template-rows:1fr 1fr;
    grid-template-areas:
      "partial total"
      "partial speed";
  }
  @media (orientation:portrait){
    body[data-mode="nav"] #app{
      grid-template-columns:1fr;
      grid-template-rows:1.7fr 1fr 0.8fr;
      grid-template-areas:
        "partial"
        "total"
        "speed";
    }
  }
  body[data-mode="nav"] #zoneWord{display:none}
  body[data-mode="nav"] #zoneSpeed{display:flex}
  body[data-mode="nav"] #zonePartial{cursor:pointer}
  body[data-mode="nav"] #partialVal{
    font-size:calc(clamp(76px,17vw,200px) * var(--numscale));
    color:var(--text);
  }
  body[data-mode="nav"] #totalVal{
    font-size:calc(clamp(48px,11vw,120px) * var(--numscale));
  }

  /* ====== LAYOUT RADAR ====== */
  body[data-mode="radar"] #app{
    grid-template-columns:1fr 1fr;
    grid-template-rows:minmax(0,1fr) auto minmax(0,1fr);
    grid-template-areas:
      "radar radar"
      "badge badge"
      "partial total";
  }
  @media (orientation:portrait){
    body[data-mode="radar"] #app{
      grid-template-columns:1fr;
      grid-template-rows:minmax(0,1.3fr) auto minmax(0,0.65fr) minmax(0,0.65fr);
      grid-template-areas:
        "radar"
        "badge"
        "partial"
        "total";
    }
  }
  body[data-mode="radar"] #zoneWord{display:none}
  body[data-mode="radar"] #zoneRadar{display:flex}
  body[data-mode="radar"] #zonePartial{cursor:pointer}
  body[data-mode="radar"] #partialVal,
  body[data-mode="radar"] #totalVal{
    font-size:calc(clamp(40px,10vw,92px) * var(--numscale));
  }
  body[data-mode="radar"] #partialVal{color:var(--text)}

  /* disposizioni alternative in orizzontale */
  @media (orientation:landscape){
    body[data-mode="radar"][data-arr="left"] #app{
      grid-template-columns:1.5fr 1fr;
      grid-template-rows:auto minmax(0,1fr) minmax(0,1fr);
      grid-template-areas:
        "radar badge"
        "radar partial"
        "radar total";
    }
    body[data-mode="radar"][data-arr="right"] #app{
      grid-template-columns:1fr 1.5fr;
      grid-template-rows:auto minmax(0,1fr) minmax(0,1fr);
      grid-template-areas:
        "badge radar"
        "partial radar"
        "total radar";
    }
    body[data-mode="radar"][data-arr="left"] #zoneRadar,
    body[data-mode="radar"][data-arr="right"] #zoneRadar{
      flex-direction:column;flex-wrap:nowrap;gap:8px;
    }
    /* nelle disposizioni laterali dimensiona sull'altezza per non tagliare nulla */
    body[data-mode="radar"][data-arr="left"] #radSym,
    body[data-mode="radar"][data-arr="right"] #radSym{
      font-size:clamp(40px,18vh,96px);
    }
    body[data-mode="radar"][data-arr="left"] #radNote,
    body[data-mode="radar"][data-arr="right"] #radNote{
      font-size:clamp(14px,4.6vh,26px);
      max-height:3.2em;
    }
    body[data-mode="radar"][data-arr="left"] #radDist,
    body[data-mode="radar"][data-arr="right"] #radDist{
      font-size:calc(clamp(34px,12vh,78px) * var(--numscale));
    }
  }

  body[data-mode="nav"] .zlabel,
  body[data-mode="radar"] .zlabel{
    left:12px;right:auto;top:10px;
    background:var(--btnbg);
    border:1px solid var(--line);
    border-radius:8px;
    padding:5px 10px;
    font-size:11px;
    color:var(--text);
  }
  #ssBadge{
    grid-area:badge;
    display:none;
    justify-self:end;
    margin:2px 14px 0;
    background:var(--green);color:#000;
    border-radius:8px;padding:5px 12px;
    font-size:12px;font-weight:800;letter-spacing:.03em;
    max-width:80%;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  body[data-mode="radar"] #ssBadge.show{display:block}

  .zone{
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    border:1px solid var(--line);
    border-radius:18px;
    margin:8px;
    background:var(--panel);
    position:relative;
    overflow:hidden;
  }
  .zlabel{
    position:absolute;top:10px;left:14px;right:14px;
    font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
  }
  .unit{font-size:14px;color:var(--muted);margin-top:2px;letter-spacing:.1em}

  #zoneTotal{grid-area:total;cursor:pointer}
  #holdBar{
    position:absolute;left:0;bottom:0;height:6px;width:0;
    background:var(--red);border-radius:0 3px 3px 0;
  }
  #toast{
    position:fixed;left:50%;bottom:calc(26px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(16px);
    background:var(--green);color:#000;
    border-radius:999px;padding:8px 18px;
    font-size:14px;font-weight:800;z-index:8;
    opacity:0;pointer-events:none;
    transition:opacity .25s, transform .25s;
    max-width:86vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #totalVal{
    font-family:var(--mono);
    font-size:calc(clamp(40px,9vw,92px) * var(--numscale));font-weight:700;
    font-variant-numeric:tabular-nums;line-height:1;
  }

  #zonePartial{grid-area:partial}
  #partialVal{
    font-family:var(--mono);
    font-size:calc(clamp(44px,10vw,100px) * var(--numscale));font-weight:800;
    font-variant-numeric:tabular-nums;line-height:1;
    color:var(--amber);
  }
  #zonePartial.stopped #partialVal{color:var(--amber-dim)}
  body[data-mode="nav"] #zonePartial.stopped #partialVal,
  body[data-mode="radar"] #zonePartial.stopped #partialVal{color:var(--text)}

  #zoneSpeed{grid-area:speed}
  #speedVal{
    font-family:var(--mono);
    font-size:calc(clamp(48px,11vw,120px) * var(--numscale));font-weight:800;
    font-variant-numeric:tabular-nums;line-height:1;
    color:var(--blue);
  }

  /* zona radar: riga orizzontale, solo testo, senza bordo né pannello */
  #zoneRadar{
    grid-area:radar;
    flex-direction:row;flex-wrap:wrap;
    justify-content:center;align-items:center;
    gap:6px 16px;
    border:none;background:none;
    text-align:center;padding:0 14px;
  }
  #radNum{
    display:inline-block;
    background:var(--green);color:#000;
    border-radius:8px;padding:2px 12px;
    font-size:clamp(16px,4vw,26px);font-weight:800;
    font-family:var(--mono);
    flex-shrink:0;
  }
  #radSym{
    font-size:clamp(54px,13vw,120px);line-height:1;
    flex-shrink:0;
  }
  #radNote{
    color:var(--text);
    font-size:clamp(20px,5vw,40px);font-weight:800;
    text-transform:uppercase;word-break:break-word;
    max-width:100%;
  }
  #radDist{
    font-family:var(--mono);
    font-size:calc(clamp(48px,12vw,100px) * var(--numscale));font-weight:800;color:var(--green);
    font-variant-numeric:tabular-nums;
    flex-shrink:0;
  }
  #radDist.near{color:var(--red)}

  #zoneWord{grid-area:word;cursor:pointer}
  #wordVal{
    font-size:calc(clamp(64px,15vw,170px) * var(--numscale));
    font-weight:900;line-height:1;
    text-align:center;
    color:var(--green);
    text-transform:uppercase;
    word-break:break-word;
    padding:0 10px;
  }
  #wordVal.numeric{
    font-family:var(--mono);
    color:var(--amber);
    font-variant-numeric:tabular-nums;
  }
  #zoneWord.stopped #wordVal.numeric{color:var(--amber-dim)}
  #wordState{
    position:absolute;bottom:12px;
    font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
  }
  #wordState.run{color:var(--green)}

  /* ====== DRAWER ====== */
  #drawerBg{
    position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:11;
    display:none;
  }
  #drawerBg.open{display:block}
  #drawer{
    position:fixed;top:0;right:0;bottom:0;width:min(300px,85vw);z-index:12;
    background:var(--panel);border-left:1px solid var(--line);
    transform:translateX(105%);transition:transform .25s ease;
    display:flex;flex-direction:column;padding:22px 20px;
    padding-top:max(22px, env(safe-area-inset-top));
    overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  #drawer.open{transform:translateX(0)}
  #drawer h2{font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:600}
  .drawer-item{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:none;border:none;border-bottom:1px solid var(--line);
    color:var(--text);
    padding:17px 2px;font-size:16px;font-weight:600;letter-spacing:.02em;
    text-align:left;width:100%;
  }
  .drawer-item .di-tag{
    font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--green);display:none;flex-shrink:0;
  }
  .drawer-item.active{color:var(--amber)}
  .drawer-item.active .di-tag{display:inline}
  .dsep{height:26px;flex-shrink:0}

  /* ====== OVERLAY ====== */
  .overlay{
    position:fixed;inset:0;background:var(--bg);z-index:13;
    display:none;flex-direction:column;padding:18px;overflow-y:auto;
    padding-top:max(18px, env(safe-area-inset-top));
  }
  .overlay.open{display:flex}
  .overlay h2{font-size:17px;letter-spacing:.15em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
  .overlay h3{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:18px 0 8px}
  .overlay p{font-size:14px;color:var(--text);margin-bottom:10px;line-height:1.5}
  .overlay p.small{font-size:13px;color:var(--muted)}
  .okbtn{
    background:var(--amber);color:#fff;border:none;width:100%;
    padding:15px;border-radius:10px;font-size:16px;font-weight:700;margin-top:auto;
  }
  body[data-theme="dark"] .okbtn{color:#000}
  .chk{display:flex;align-items:center;gap:10px;font-size:14px;margin:14px 0}
  .chk input{width:22px;height:22px}
  .grow{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px}
  .gbadge{
    flex-shrink:0;min-width:92px;text-align:center;
    background:var(--inputbg);border:1px solid var(--line);color:var(--green);
    border-radius:8px;padding:7px 10px;
    font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    font-family:var(--mono);
  }
  .grow p{margin:0;font-size:14px;line-height:1.55}

  table{width:100%;border-collapse:collapse;margin-bottom:14px}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:left;padding:6px 3px}
  td{padding:3px}
  td input, td select{
    width:100%;padding:10px 8px;background:var(--inputbg);border:1px solid var(--line);
    border-radius:8px;color:var(--text);font-size:16px;
  }
  td select{font-size:20px;padding:8px 4px}
  td button{background:none;border:none;color:var(--red);font-size:20px;padding:6px}
  .rowbtns{display:flex;gap:10px;margin-bottom:8px}
  .rowbtns button{
    flex:1;padding:14px;border-radius:10px;font-size:15px;font-weight:600;
    background:var(--panel);border:1px solid var(--line);color:var(--text);
  }
  .setting-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;font-size:14px}
  .setting-row select{padding:10px;background:var(--inputbg);border:1px solid var(--line);border-radius:8px;color:var(--text);font-size:15px}
  .setting-row input[type=checkbox]{width:24px;height:24px}

  #rbImport{
    width:100%;min-height:110px;
    background:var(--inputbg);border:1px solid var(--line);border-radius:10px;
    color:var(--text);font-size:14px;padding:10px;
    font-family:var(--mono);
    margin-bottom:8px;
  }
  #rbImportBtn{
    width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;
    background:var(--btnbg);border:2px solid var(--green);color:var(--green);
    margin-bottom:6px;
  }
  #rbImportMsg{font-size:13px;color:var(--green);margin-bottom:8px;min-height:18px}

  #ssBar{display:flex;gap:8px;margin-bottom:8px}
  #ssName{
    flex:1;padding:12px;background:var(--inputbg);border:1px solid var(--line);
    border-radius:8px;color:var(--text);font-size:15px;
  }
  #ssSave{
    padding:12px 14px;border-radius:8px;background:var(--btnbg);
    border:2px solid var(--amber);color:var(--amber);font-weight:700;font-size:14px;
  }
  #ssMsg{font-size:13px;color:var(--green);min-height:18px;margin-bottom:6px}
  .ss-row{
    display:flex;align-items:center;gap:8px;
    background:var(--btnbg);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;margin-bottom:8px;
  }
  .ss-row .ss-name{flex:1;font-size:15px;font-weight:600;word-break:break-word}
  .ss-row button{
    background:none;border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:8px 12px;font-size:13px;
  }
  .ss-row button.del{color:var(--red);border:none;font-size:18px;padding:6px}
  #ssEmpty{font-size:13px;color:var(--muted);margin-bottom:8px}

  #flash{
    position:fixed;inset:0;background:rgba(255,180,0,.18);z-index:5;
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
</style>
</head>
<body data-mode="pilot" data-theme="dark">

<div id="statusbar">
  <span><span id="gpsdot" class="r"></span><button id="btnInfo">i</button></span>
  <span id="clock">--:--:--</span>
  <span><button id="btnArr">⇄</button><button id="btnMenu">☰</button></span>
</div>

<div id="legend">
  <b data-t="legTitle"></b>
  <span class="dot" style="background:var(--green)"></span><span data-t="legGreen"></span><br>
  <span class="dot" style="background:var(--blue)"></span><span data-t="legBlue"></span><br>
  <span class="dot" style="background:var(--red)"></span><span data-t="legRed"></span>
</div>

<div id="app">
  <div class="zone" id="zoneWord">
    <span class="zlabel" data-t="wordShort"></span>
    <div id="wordVal" class="numeric">0</div>
    <div id="wordState"></div>
  </div>

  <div class="zone" id="zoneRadar">
    <span id="radNum"></span>
    <div id="radSym">—</div>
    <div id="radNote"></div>
    <div id="radDist"></div>
  </div>

  <span id="ssBadge"></span>

  <div class="zone" id="zoneTotal">
    <span class="zlabel" data-t="totalShort"></span>
    <div id="totalVal">0,00</div>
    <div class="unit" id="totalUnit">km</div>
    <div id="holdBar"></div>
  </div>

  <div class="zone stopped" id="zonePartial">
    <span class="zlabel" id="partialLbl" data-t="partialLabel"></span>
    <div id="partialVal">0</div>
    <div class="unit" id="partialUnit">m</div>
  </div>

  <div class="zone" id="zoneSpeed">
    <span class="zlabel" data-t="speedLabel"></span>
    <div id="speedVal">0</div>
    <div class="unit" id="speedUnit">km/h</div>
  </div>
</div>

<div id="flash"></div>
<div id="toast"></div>

<!-- ============ MENU LATERALE ============ -->
<div id="drawerBg"></div>
<div id="drawer">
  <h2 data-t="drawerTitle"></h2>
  <button class="drawer-item" id="drvPilot"><span data-t="drvPilot"></span><span class="di-tag" data-t="activeTag"></span></button>
  <button class="drawer-item" id="drvTrip"><span data-t="navTrip"></span><span class="di-tag" data-t="activeTag"></span></button>
  <button class="drawer-item" id="drvRadar"><span>Radar</span><span class="di-tag" data-t="activeTag"></span></button>
  <div class="dsep"></div>
  <button class="drawer-item" id="drvWords"><span data-t="wordsTitle"></span></button>
  <button class="drawer-item" id="drvRb"><span data-t="navRadar"></span></button>
  <button class="drawer-item" id="drvSet"><span data-t="drvSet"></span></button>
  <button class="drawer-item" id="drvInfo"><span data-t="guideMenu"></span></button>
</div>

<!-- ============ GUIDA ============ -->
<div class="overlay" id="intro">
  <h2 data-t="introTitle"></h2>
  <div class="grow"><span class="gbadge" data-t="totalShort"></span><p data-t="gTotal"></p></div>
  <div class="grow"><span class="gbadge" data-t="partialLabel"></span><p data-t="gPartial"></p></div>
  <div class="grow"><span class="gbadge">➡️ <span data-t="thNote"></span></span><p data-t="gNote"></p></div>
  <div class="grow"><span class="gbadge">Radar</span><p data-t="gRb"></p></div>
  <div class="grow"><span class="gbadge" data-t="tunnelLabel"></span><p data-t="gTunnel"></p></div>
  <div class="grow"><span class="gbadge">GPS</span><p data-t="intro4"></p></div>
  <div class="grow"><span class="gbadge">☰ <span data-t="drawerTitle"></span></span><p data-t="gMenu"></p></div>
  <div class="chk"><input type="checkbox" id="hideIntro"><label for="hideIntro" data-t="dontShow"></label></div>
  <button class="okbtn" id="closeIntro" data-t="gOk"></button>
</div>

<!-- ============ MENU PILOTA (tabella parole) ============ -->
<div class="overlay" id="pilotMenu">
  <h2 data-t="pmTitle"></h2>

  <h3 data-t="wordsTitle"></h3>
  <p class="small" data-t="setDesc"></p>
  <table>
    <thead><tr><th style="width:26%" data-t="thFrom"></th><th style="width:26%" data-t="thTo"></th><th data-t="thWord"></th><th></th></tr></thead>
    <tbody id="tblBody"></tbody>
  </table>
  <div class="rowbtns">
    <button id="addRow" data-t="addRow"></button>
  </div>
  <div class="setting-row">
    <span data-t="speakLabel"></span>
    <input type="checkbox" id="speakToggle">
  </div>

  <button class="okbtn" id="closePilot" data-t="close"></button>
</div>

<!-- ============ MENU RADAR (editor road book) ============ -->
<div class="overlay" id="navMenu">
  <h2 data-t="nmTitle"></h2>

  <h3 data-t="ssTitle"></h3>
  <div id="ssBar">
    <input type="text" id="ssName">
    <button id="ssSave" data-t="ssSave"></button>
  </div>
  <div id="ssMsg"></div>
  <div id="ssList"></div>
  <div id="ssEmpty" data-t="ssEmpty"></div>

  <h3 data-t="rbImpTitle"></h3>
  <p class="small" data-t="rbImpDesc"></p>
  <textarea id="rbImport" placeholder="0,00 ; controllo ; T.C. 0&#10;0,22 ; rotonda terza uscita ; Via Campo Sportivo&#10;0,52 ; incrocio sinistra ; Autostrada Montecatini"></textarea>
  <button id="rbImportBtn" data-t="rbImpBtn"></button>
  <div id="rbImportMsg"></div>

  <h3 data-t="rbTitle"></h3>
  <p class="small" data-t="rbDesc"></p>
  <table>
    <thead><tr><th style="width:26%" data-t="thDist"></th><th style="width:22%" data-t="thSym"></th><th data-t="thNote"></th><th></th></tr></thead>
    <tbody id="rbBody"></tbody>
  </table>
  <div class="rowbtns">
    <button id="rbAddRow" data-t="addRow"></button>
    <button id="rbClear" data-t="rbClear" style="color:var(--red)"></button>
  </div>

  <button class="okbtn" id="closeNav" data-t="close"></button>
</div>

<!-- ============ IMPOSTAZIONI GENERALI ============ -->
<div class="overlay" id="genMenu">
  <h2 data-t="gsTitle"></h2>

  <div class="setting-row">
    <span data-t="langLabel"></span>
    <select id="langSel">
      <option value="it">Italiano</option>
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="es">Español</option>
      <option value="de">Deutsch</option>
      <option value="pt">Português</option>
      <option value="ja">日本語</option>
      <option value="cs">Čeština</option>
    </select>
  </div>
  <div class="setting-row">
    <span data-t="unitLabel"></span>
    <select id="unitSel">
      <option value="metric">km · km/h</option>
      <option value="imperial">mi · mph</option>
    </select>
  </div>
  <div class="setting-row">
    <span data-t="numLabel"></span>
    <select id="numSel">
      <option value="0" data-t="numSmall"></option>
      <option value="1" data-t="numNormal"></option>
      <option value="2" data-t="numLarge"></option>
    </select>
  </div>
  <div class="setting-row">
    <span data-t="fontLabel"></span>
    <select id="fontSel">
      <option value="jb">JetBrains Mono</option>
      <option value="share">Share Tech Mono</option>
      <option value="orbitron">Orbitron</option>
      <option value="system">System</option>
    </select>
  </div>
  <div class="setting-row">
    <span data-t="timeLabel"></span>
    <select id="timeSel">
      <option value="24" data-t="time24"></option>
      <option value="12" data-t="time12"></option>
    </select>
  </div>
  <div class="setting-row">
    <span data-t="themeLabel"></span>
    <select id="themeSel">
      <option value="dark" data-t="themeDark"></option>
      <option value="light" data-t="themeLight"></option>
    </select>
  </div>

  <button class="okbtn" id="closeGen" data-t="close"></button>
</div>

const LOCALES = {it:'it-IT',en:'en-US',fr:'fr-FR',es:'es-ES',de:'de-DE',pt:'pt-PT',ja:'ja-JP',cs:'cs-CZ'};

const SYMS = ['⬅️','➡️','⬆️','↩️','↪️','➕','🔄','⛪','🏰','🌉','🛤️','🛑','⚠️','⛽','🏠','🌳','🚩','🏁','🕐'];

const SYM_WORDS = [
  [/rotond|roundabout|rond/i, '🔄'],
  [/incrocio|crossroad|junction|bivio|fork/i, '➕'],
  [/sinistra|left|gauche/i, '⬅️'],
  [/destra|right|droite/i, '➡️'],
  [/diritto|dritto|straight|ahead/i, '⬆️'],
  [/stop/i, '🛑'],
  [/ponte|bridge/i, '🌉'],
  [/ferrovia|railway|passaggio a livello|rail/i, '🛤️'],
  [/chiesa|church/i, '⛪'],
  [/benzina|carburante|fuel|refuel/i, '⛽'],
  [/pericolo|attenzione|caution|danger|!!/i, '⚠️'],
  [/partenza|start|t\.?c\.?|c\.?o\.?|controllo|timbro|orologio|clock/i, '🕐'],
  [/arrivo|finish|fine/i, '🏁']
];
function wordToSym(s){
  for(const [re, sym] of SYM_WORDS){ if(re.test(s)) return sym; }
  return '⚠️';
}
function extractExit(s){
  const m = String(s).match(/((?:prima|seconda|terza|quarta|quinta|sesta|1|2|3|4|5|6)\s*[ªa°]?\s*uscita|uscita\s*(?:n\.?\s*)?\d)/i);
  return m ? m[1].toUpperCase() : null;
}

    cfg.rb = cfg.rb.map(r => r.d !== undefined && r.km === undefined ? {km:(parseFloat(r.d)/1000)||'', s:r.s, n:r.n} : r);
  }
}catch(e){}

/* ================= GPS ================= */
function haversine(lat1, lon1, lat2, lon2){
  const R = 6371000, rad = Math.PI/180;
  const dLat = (lat2-lat1)*rad, dLon = (lon2-lon1)*rad;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

function onFix(pos){
  const c = pos.coords;
  const acc = c.accuracy;

  gpsdot.className = acc < 6 ? 'g' : (acc <= 10 ? 'b' : 'r');

  const hasSpeed = (c.speed !== null && !isNaN(c.speed));
  const v = hasSpeed ? (c.speed < 0.7 ? 0 : c.speed) : null;

  if(acc > ACC_LIMIT && !(v !== null && v > 3)) return;

  if(v !== null){
    curSpeed = v;
    lastGoodFix = performance.now();
    lastPos = c;
  } else {
    if(lastPos){
      const d = haversine(lastPos.latitude, lastPos.longitude, c.latitude, c.longitude);
      const noiseFloor = Math.max(2, acc * 0.5);
      if(d >= noiseFloor && d < 500){
        total += d;
        if(partialActive()) partial += d;
      }
    }
    curSpeed = 0;
    lastGoodFix = performance.now();
    lastPos = c;
  }
}

function onErr(err){ gpsdot.className='r'; }

navigator.geolocation.watchPosition(onFix, onErr, {
  enableHighAccuracy: true,
  maximumAge: 0,
  timeout: 15000
});

/* ================= PAROLE A INTERVALLI ================= */
function activeWord(p){
  for(const r of cfg.rows){
    const a = parseFloat(r.from);
    const b = (r.to === '' || r.to === null || r.to === undefined) ? Infinity : parseFloat(r.to);
    if(!isNaN(a) && r.w && p >= a && p < (isNaN(b) ? Infinity : b)) return r.w;
  }
  return null;
}

/* ================= RADAR ================= */
function parseKm(s){
  if(typeof s === 'number') return s;
  return parseFloat(String(s).replace(',', '.'));
}

/* azzeramento automatico del parziale a ogni riferimento superato (modalità Radar) */
function rbAutoReset(){
  if(!cfg.rb.length){ rbPassedIdx = null; return; }
  let idx = -1;
  for(let i = 0; i < cfg.rb.length; i++){
    const dM = parseKm(cfg.rb[i].km) * 1000;
    if(isNaN(dM)) continue;
    if(total >= dM) idx = i;
    else break;
  }
  if(rbPassedIdx === null){
    rbPassedIdx = idx;
    return;
  }
  if(idx > rbPassedIdx){
    const dM = parseKm(cfg.rb[idx].km) * 1000;
    partial = Math.max(0, total - dM);
  }
  rbPassedIdx = idx;
}

/* zona radar — mostra il riferimento in arrivo con countdown in metri */
let radShownIdx = -2;
function radarRender(){
  if(!cfg.rb.length){
    if(radShownIdx !== -2){
      radNum.textContent = '';
      radSym.textContent = '—';
      radNote.textContent = '';
      radDist.textContent = '';
      radShownIdx = -2;
    }
    return;
  }
  let next = -1, dM = 0;
  for(let i = 0; i < cfg.rb.length; i++){
    const d = parseKm(cfg.rb[i].km) * 1000;
    if(isNaN(d)) continue;
    if(total < d){ next = i; dM = d; break; }
  }
  if(next === -1){
    /* superati tutti i riferimenti: resta l'ultimo, countdown a 0 */
    const li = cfg.rb.length - 1;
    if(radShownIdx !== li + 10000){
      const last = cfg.rb[li];
      radNum.textContent = cfg.rb.length;
      radSym.textContent = last.s || '🏁';
      radNote.textContent = last.n || '';
      radShownIdx = li + 10000;
    }
    radDist.textContent = fmtDist(0) + ' ' + distUnit();
    radDist.classList.remove('near');
    return;
  }
  if(radShownIdx !== next){
    const r = cfg.rb[next];
    radNum.textContent = next + 1;
    radSym.textContent = r.s || '⚠️';
    radNote.textContent = r.n || '';
    radShownIdx = next;
  }
  const rem = Math.max(0, dM - total);
  radDist.textContent = fmtDist(rem) + ' ' + distUnit();
  radDist.classList.toggle('near', rem <= 100);
}

/* ================= CONTEGGIO CONTINUO + RENDER ================= */
const loc = () => LOCALES[cfg.lang] || 'en-US';
function fmtDist(m){
  const v = isImp() ? m/MI : m/1000;
  return v.toLocaleString(loc(), {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtM(m){ return Math.round(m).toLocaleString(loc()); }
function pad(n){ return n < 10 ? '0'+n : ''+n; }

function frame(){
  const now = performance.now();
  const dtF = (now - lastFrame) / 1000;
  lastFrame = now;

  const d0 = new Date();
  let hh = d0.getHours(), suffix = '';
  if(!cfg.h24){
    suffix = hh >= 12 ? ' PM' : ' AM';
    hh = hh % 12 || 12;
  }
  clock.textContent = pad(hh)+':'+pad(d0.getMinutes())+':'+pad(d0.getSeconds())+suffix;

  const sinceFix = (now - lastGoodFix) / 1000;
  const maxGap = 60; /* modalità galleria sempre attiva */
  const counting = curSpeed > 0 && lastGoodFix > 0 && sinceFix < maxGap;
  if(counting && dtF > 0 && dtF < 1){
    const d = curSpeed * dtF;
    total += d;
    if(partialActive()) partial += d;
  }

  totalVal.textContent = fmtDist(total);
  partialVal.textContent = cfg.mode === 'pilot' ? fmtM(partial) : fmtDist(partial);

  if(cfg.mode === 'nav'){
    const target = counting ? curSpeed : 0;
    dispSpeed += (target - dispSpeed) * Math.min(1, dtF * 3);
    if(Math.abs(target - dispSpeed) < 0.05) dispSpeed = target;
    const s = isImp() ? dispSpeed*2.236936 : dispSpeed*3.6;
    speedVal.textContent = s.toLocaleString(loc(), {minimumFractionDigits:1, maximumFractionDigits:1});
  }

  if(cfg.mode === 'radar'){
    rbAutoReset();
    radarRender();
  }

  if(cfg.mode === 'pilot'){
    if(running){
      const w = activeWord(partial);
      currentWord = w;
      if(w && cfg.speak && w !== lastSpoken && 'speechSynthesis' in window){
        lastSpoken = w;
        const u = new SpeechSynthesisUtterance(w);
        u.lang = loc();
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      }
      if(!w) lastSpoken = null;
    }
    if(currentWord){
      if(wordVal.textContent !== currentWord){ wordVal.textContent = currentWord; }
      wordVal.classList.remove('numeric');
    } else {
      wordVal.textContent = fmtM(partial);
      wordVal.classList.add('numeric');
    }
  }
  requestAnimationFrame(frame);
}

$('rbImportBtn').addEventListener('click', ()=>{
  const lines = $('rbImport').value.split('\n');
  let added = 0;
  for(const line of lines){
    const parts = line.split(';').map(s => s.trim());
    if(parts.length < 2) continue;
    const km = parseKm(parts[0]);
    if(isNaN(km)) continue;
    const sym = wordToSym(parts[1] || '');
    let note = (parts[2] || '').trim();
    const exit = extractExit(parts[1] || '');
    if(exit){ note = exit + (note ? ' · ' + note : ''); }
    if(!note) note = (parts[1] || '').trim();
    cfg.rb.push({km: parts[0].replace('.', ','), s: sym, n: note});
    added++;
  }
  if(added > 0){
    cfg.rb.sort((a,b)=>parseKm(a.km)-parseKm(b.km));
    rbPassedIdx = null;
    radShownIdx = -2;
    buildRbTable();
    $('rbImport').value = '';
    $('rbImportMsg').textContent = added + ' ' + t('rbImpOk');
  } else {
    $('rbImportMsg').textContent = t('rbImpErr');
  }
});

  applyTheme();
  $('genMenu').classList.remove('open');
});

/* ================= SCHERMO SEMPRE ACCESO ================= */
let wakeLock = null;
async function keepAwake(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
    }
  }catch(e){}
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible') keepAwake();
});
keepAwake();

/* ================= SERVICE WORKER (PWA) ================= */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

applyTheme();
applyMode();
applyLayout();
requestAnimationFrame(frame);
})();
</script>
