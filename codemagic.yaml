workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: rallytrip
    environment:
      ios_signing:
        provisioning_profiles:
          - RallyTrip AppStore
        certificates:
          - rallytrip-dist
      vars:
        BUNDLE_ID: "com.dapra.rallytrip"
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
    scripts:
      - name: Installa dipendenze npm
        script: |
          npm install
      - name: Sincronizza Capacitor iOS
        script: |
          npx cap sync ios
      - name: Prepara la firma
        script: |
          xcode-project use-profiles
      - name: Numero build
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Compila IPA
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "App"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
